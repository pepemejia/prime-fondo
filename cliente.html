<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal Cliente | Prime</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header class="site-header">
    <nav class="navbar">
      <a href="index.html" class="logo">Prime</a>
      <a href="index.html" class="nav-link">Cerrar sesión</a>
    </nav>
  </header>

  <main class="client-dashboard">
    <section class="dashboard-hero">
      <h1>Bienvenido al Portal de Cliente</h1>
      <p>Consulta el resumen actualizado de tu inversión.</p>
    </section>

    <section class="dashboard-cards">
      <article class="dashboard-card">
        <h3>Capital invertido</h3>
        <p class="dashboard-amount">$185,000 MXN</p>
      </article>

      <article class="dashboard-card">
        <h3>Interés generado</h3>
        <p class="dashboard-amount">$15,577 MXN</p>
      </article>

      <article class="dashboard-card">
        <h3>Saldo total</h3>
        <p class="dashboard-amount">$200,577 MXN</p>
      </article>

      <article class="dashboard-card">
        <h3>Tasa anual</h3>
        <p class="dashboard-amount">8.42%</p>
      </article>
    </section>
  </main>

</body>
</html>
